name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts are executable
        run: |
          bash scripts/validate.sh examples/fullstack-saas
          bash scripts/stats.sh examples/fullstack-saas
      - name: Test CLI
        run: node bin/claude-cortex.js --help
